name: Build and Deploy to Netlify

on:
  push:
    branches: [master]
    paths:
      - 'projects/personal-portfolio/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projects/personal-portfolio/package-lock.json

      - name: Install dependencies
        working-directory: projects/personal-portfolio
        run: npm ci

      - name: Build
        working-directory: projects/personal-portfolio
        run: npm run build

      - name: Deploy to Netlify
        working-directory: projects/personal-portfolio
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir dist --site e798105c-45e0-4ccb-9d23-73ff01b9c6c3 --auth $NETLIFY_AUTH_TOKEN
